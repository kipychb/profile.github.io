<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Private Collection // Kars' Dream Lab</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Noto+Serif+TC:wght@300;500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="project.css">
    <link rel="stylesheet" href="interests.css">
</head>

<body class="project-page">
    <div class="grainy-bg"></div>
    <div class="dot-overlay"></div>
    <div class="watercolor-overlay"></div>

    <div class="star-decor" style="top:15%; left:10%;">✦</div>
    <div class="star-decor" style="top:25%; left:80%;">✧</div>
    <div class="star-decor" style="top:60%; left:5%;">✦</div>
    <div class="star-decor" style="top:85%; left:90%;">✧</div>

    <nav class="nav-back"><a href="index.html">← BACK TO GALLERY</a></nav>

    <main class="gallery-wrapper" id="main-content">
        <header class="project-intro">
            <div class="wing-header">
                <span class="wing">ʚ</span>
                <span class="sparkle-icon">✦</span>
                <span class="wing">ɞ</span>
            </div>
            <h1 class="main-title">Dream <br><i>Archive</i></h1>
            <div class="reflection-box dream-border">
                <h3>VISUAL LAB / 靈感筆記</h3>
                <p>
                    我對美的定義來自於那些微小卻閃爍的瞬間。<strong>波點</strong>的節奏、<strong>翅膀</strong>的輕盈、<strong>水鑽</strong>的折射，這些元素在我的腦海中交織成一種「復古未來」的實驗性美學。
                </p>
            </div>
        </header>

        <section class="exhibit-section">
            <div class="gallery-row manga-zone">
                <div class="art-piece rhinestone-frame">
                    <img src="image/manga-lab.jpg" alt="Manga">
                    <div class="corner-star top-right">✦</div>
                    <div class="corner-star bottom-left">✦</div>
                    <div class="exhibit-label">
                        <span class="concept-title">01. LINE ART ʚ ɞ</span>
                        <p class="concept-text">日本漫畫的構圖教導我如何在平面中尋找深度。在這裡，每一道線條都有它的重量。</p>
                    </div>
                </div>
            </div>

            <div class="gallery-row music-zone">
                <div class="retro-pop-card">
                    <div class="inner-dots"></div>
                    <img src="image/music-retro.jpg" alt="Music">
                    <div class="exhibit-label">
                        <span class="concept-title">02. RETRO RHYTHM</span>
                        <p class="concept-text">音樂是我的調色盤。我喜歡波點在復古普普風中的律動感，這是我創作時的節拍。</p>
                    </div>
                </div>
            </div>

            <div class="gallery-row travel-zone">
                <div class="polaroid-item rot-left">
                    <img src="image/japan-snap.jpg" alt="Japan">
                    <p class="polaroid-text">✦ KYOTO DREAM ✦</p>
                </div>
                <div class="polaroid-item rot-right">
                    <img src="image/indonesia-snap.jpg" alt="Indonesia">
                    <p class="polaroid-text">ʚ BALI BREEZE ɞ</p>
                </div>
            </div>
        </section>
    </main>

    <script>
        window.onload = () => {
            document.getElementById('main-content').classList.add('loaded');
        };
    </script>
</body>

</html>
