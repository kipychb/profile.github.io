<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MY skills</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Upright:wght@500;700&family=Noto+Serif+TC:wght@300;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="skills.css">
</head>

<body>
    <div class="window"></div>
    <nav class="gallery-nav">
        <h1 class="gallery-title">My <br>Skills</h1>
        <a href="index.html" class="back-home">
            <span>Back to Home</span></a>
    </nav>

    <main class="linear-quest-container">

        <div class="player-character">
            <img src="image/kitty (1).png" alt="Kars" class="char-img">
        </div>

        <div class="vertical-path">

            <section class="quest-node">
                <div class="node-art">
                    <img src="image/Windows-icon.png" alt="Stage 1">
                </div>
                <div class="node-content">
                    <h3 class="node-title">Stage 01 ✦ 程式煉金</h3>
                    <div class="stat-list">
                        <div class="stat"><span>HTML/CSS</span><span class="stars"> ★★★★★</span></div>
                        <div class="stat"><span>JavaScript</span><span class="stars"> ★★★★☆</span></div>
                        <div class="stat"><span>Python</span><span class="stars"> ★★★☆☆</span></div>
                    </div>
                    <p class="node-desc">在邏輯訓練中，建立穩固的開發基礎。</p>
                </div>
            </section>

            <section class="quest-node">
                <div class="node-art">
                    <img src="image/design-icon.png" alt="Stage 2">
                </div>
                <div class="node-content">
                    <h3 class="node-title">Stage 02 ✦ 美學工坊</h3>
                    <div class="stat-list">
                        <div class="stat"><span>UI/UX</span><span class="stars"> ★★★★☆</span></div>
                        <div class="stat"><span>Figma/Ai</span><span class="stars"> ★★★★★</span></div>
                        <div class="stat"><span>Visual</span><span class="stars"> ★★★★☆</span></div>
                    </div>
                    <p class="node-desc">融合日系與復古，縫補具溫度的介面。</p>
                </div>
            </section>

            <section class="quest-node">
                <div class="node-art">
                    <img src="image/people-icon.png" alt="Stage 3">
                </div>
                <div class="node-content">
                    <h3 class="node-title">Stage 03 ✦ 核心共鳴</h3>
                    <div class="stat-list">
                        <div class="stat"><span>Teamwork</span><span class="stars"> ★★★★★</span></div>
                        <div class="stat"><span>Communication</span><span class="stars"> ★★★★★</span></div>
                        <div class="stat"><span>Logic</span><span class="stars"> ★★★★☆</span></div>
                    </div>
                    <p class="node-desc">將複雜需求轉化為清晰的執行方案。</p>
                </div>
            </section>

            <section class="tbc-section">
                <div class="target-star">
                    <img src="image/star.png">
                </div>
                <h2 class="tbc-title">To Be<br>Continued ...</h2>
            </section>
        </div>
    </main>
</body>

</html>
