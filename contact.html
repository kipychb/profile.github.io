<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact info</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Courier+Prime&family=Noto+Serif+TC:wght@500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="contact.css">
</head>

<body class="envelope-page">
    <div class="background-dots"></div>
    <main class="main-envelope">
        <div class="air-mail-border top"></div>
        <div class="air-mail-border bottom"></div>
        <div class="air-mail-border left"></div>
        <div class="air-mail-border right"></div>

        <header class="envelope-header">
            <div class="postage-area">
                <div class="stamp">
                    <img src="image/kitty (1).png" alt="stamp">
                </div>
            </div>
        </header>

        <section class="address-section">
            <div class="to-label">TO:</div>
            <div class="address-content">
                <h2 class="recipient-name">Elyra</h2>
                <p class="address-line">Zhongli District, Taoyuan City</p>
                <p class="address-line">Taiwan, 320</p>

                <div class="contact-methods">
                    <a href="mailto:chenpoyu0109@gmail.com" class="method-link">
                        <i class="fa-regular fa-envelope"></i> chenpoyu0109@gmail.com
                    </a>
                    <a href="https://www.instagram.com/syurenx/" target="_blank" class="method-link">
                        <i class="fa-brands fa-instagram"></i> @syurenx
                    </a>
                    <a href="tel:0965168166" class="method-link">
                        <i class="fa-solid fa-phone-flip"></i> 0965-168-166
                    </a>
                </div>
            </div>
        </section>

        <footer class="envelope-footer">
            <div class="wax-seal">
                <a href="index.html"><i class="fa-solid fa-house"></i></a>
            </div>
        </footer>
    </main>

    <div class="texture-overlay"></div>
</body>

</html>
